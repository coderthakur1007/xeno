name: ci

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: pip install -r apps/api/requirements.txt
      - name: Lint with ruff
        run: pip install ruff && ruff check apps/api/app apps/simulator/app
      - name: Run tests with coverage
        run: PYTHONPATH=apps/api pytest apps/api/tests --cov=app --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: coverage.xml

  simulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/simulator/requirements.txt
      - run: pip install -r apps/simulator/requirements.txt
      - name: Lint with ruff
        run: pip install ruff && ruff check apps/simulator/app
      - run: PYTHONPATH=apps/simulator pytest apps/simulator/tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - working-directory: apps/web
        run: npm ci
      - working-directory: apps/web
        run: npm run build
      - name: Lint
        working-directory: apps/web
        run: npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [api, simulator, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t xeno/api:ci -f apps/api/Dockerfile apps/api
      - name: Build Web image
        run: docker build -t xeno/web:ci -f apps/web/Dockerfile apps/web
      - name: Build Simulator image
        run: docker build -t xeno/simulator:ci -f apps/simulator/Dockerfile apps/simulator

  deploy:
    runs-on: ubuntu-latest
    needs: [api, simulator, web, docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        run: echo "Deploy step placeholder — wire up your deployment target here"
